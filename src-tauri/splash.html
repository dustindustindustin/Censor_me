<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0F0F14;
      color: #F8F7F8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    .logo-container {
      position: relative;
      width: 300px;
      height: 50px;
      margin-bottom: 32px;
    }
    .logo-container svg {
      width: 100%;
      height: 100%;
    }
    .shimmer {
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(171, 9, 83, 0.15) 40%,
        rgba(171, 9, 83, 0.3) 50%,
        rgba(171, 9, 83, 0.15) 60%,
        transparent 100%
      );
      animation: shimmer 2s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 200%; }
    }
    .status {
      color: #888;
      font-size: 13px;
      letter-spacing: 0.02em;
      min-height: 20px;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #333;
      border-top-color: #AB0953;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
